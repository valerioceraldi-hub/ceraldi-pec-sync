name: Ceraldi PEC Sync

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install schedule

      - name: Esegui sync PEC
        env:
          PEC_HOST: ${{ secrets.PEC_HOST }}
          PEC_PORT: ${{ secrets.PEC_PORT }}
          PEC_USER: ${{ secrets.PEC_USER }}
          PEC_PASS: ${{ secrets.PEC_PASS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO:  ${{ secrets.GH_REPO }}
          GH_BRANCH: main
          SYNC_INTERVAL_HOURS: "2"
        run: python pec_sync.py
