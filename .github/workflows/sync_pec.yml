name: PEC Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install schedule
      - name: Esegui sync PEC
        run: python pec_sync.py
        env:
          PEC_HOST: ${{ secrets.PEC_HOST }}
          PEC_PORT: ${{ secrets.PEC_PORT }}
          PEC_USER: ${{ secrets.PEC_USER }}
          PEC_PASS: ${{ secrets.PEC_PASS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: main
